name: Mobile APK

# Builds an installable Android APK for the React Native app in mobile/app.
# The GitHub-hosted runner already has the Android SDK, so no local toolchain
# is needed. The APK is uploaded as a downloadable artifact; on a tag it is
# also attached to the GitHub Release.

on:
  push:
    branches: [mobile-app, main]
    paths:
      - "mobile/app/**"
      - ".github/workflows/mobile-apk.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: mobile/app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          path=$(find app/build/outputs/apk -name '*.apk' | head -n1)
          echo "path=mobile/app/android/$path" >> "$GITHUB_OUTPUT"
          echo "Built: $path"
        working-directory: mobile/app/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineTranscriber-android-debug
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
